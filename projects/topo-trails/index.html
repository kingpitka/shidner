<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wrangell Trails</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --ink: #0d0d0d;
  --paper: #f5f0e8;
  --accent: #ff3c00;
  --blue: #0057ff;
  --open: #2e7d4f;
  --caution: #c97d00;
  --closed: #b82000;
  --unmaintained: #6b5c45;
  --panel: 300px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'DM Mono', monospace;
  background: var(--paper);
  color: var(--ink);
  display: flex;
  flex-direction: column;
}

/* HEADER */
header {
  height: 48px;
  border-bottom: 2px solid var(--ink);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1rem;
  flex-shrink: 0;
  background: var(--paper);
  z-index: 1000;
}
.wordmark {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  letter-spacing: 0.05em;
}
.wordmark em { color: var(--accent); font-style: normal; }
.header-right {
  display: flex;
  align-items: center;
  gap: 6px;
}
.hbtn {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 5px 11px;
  border: 1.5px solid var(--ink);
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.1s;
  white-space: nowrap;
}
.hbtn:hover, .hbtn.active { background: var(--ink); color: var(--paper); }
.hbtn.draw { border-color: var(--blue); color: var(--blue); }
.hbtn.draw:hover, .hbtn.draw.active { background: var(--blue); color: white; border-color: var(--blue); }

/* BODY */
.app {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* MAP */
#map {
  flex: 1;
  z-index: 1;
}

/* PANEL */
.panel {
  width: var(--panel);
  border-left: 2px solid var(--ink);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  background: var(--paper);
  z-index: 100;
  overflow: hidden;
}
.panel-header {
  border-bottom: 2px solid var(--ink);
  padding: 10px 14px;
  flex-shrink: 0;
}
.panel-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.15rem;
  letter-spacing: 0.05em;
}
.panel-sub {
  font-size: 0.58rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.45;
  margin-top: 1px;
}
.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px;
}
.panel-body::-webkit-scrollbar { width: 3px; }
.panel-body::-webkit-scrollbar-thumb { background: rgba(13,13,13,0.2); }

/* TRAIL LIST */
.trail-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border: 1.5px solid transparent;
  margin-bottom: 5px;
  cursor: pointer;
  transition: border-color 0.1s, background 0.1s;
}
.trail-item:hover { border-color: var(--ink); }
.trail-item.active { border-color: var(--ink); background: var(--ink); color: var(--paper); }
.trail-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}
.trail-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.95rem;
  letter-spacing: 0.04em;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.trail-km {
  font-size: 0.58rem;
  opacity: 0.55;
  flex-shrink: 0;
}

/* STATUS PILL */
.status-pill {
  display: inline-block;
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 8px;
  color: white;
  margin-bottom: 10px;
}

/* DETAIL */
.detail-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  letter-spacing: 0.04em;
  line-height: 1;
  margin-bottom: 6px;
}
.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 12px;
}
.meta-cell {
  border: 1px solid rgba(13,13,13,0.18);
  padding: 6px 8px;
}
.meta-label {
  font-size: 0.55rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.45;
  margin-bottom: 2px;
}
.meta-value { font-size: 0.75rem; }
.notes-block {
  border-left: 2px solid var(--ink);
  padding-left: 10px;
  margin-bottom: 14px;
  font-size: 0.7rem;
  line-height: 1.7;
  opacity: 0.75;
  font-style: italic;
}
.detail-btn {
  width: 100%;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 8px;
  border: 1.5px solid var(--ink);
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  margin-bottom: 6px;
  transition: all 0.1s;
}
.detail-btn:hover { background: var(--ink); color: var(--paper); }
.detail-btn.danger { border-color: var(--closed); color: var(--closed); }
.detail-btn.danger:hover { background: var(--closed); color: white; }
.back-btn {
  font-size: 0.58rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.45;
  cursor: pointer;
  margin-bottom: 12px;
  display: inline-block;
}
.back-btn:hover { opacity: 1; }

/* FORM */
.form-row { margin-bottom: 10px; }
.form-label {
  display: block;
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.5;
  margin-bottom: 3px;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  padding: 6px 8px;
  border: 1.5px solid rgba(13,13,13,0.35);
  background: var(--paper);
  color: var(--ink);
  outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--ink); }
.form-textarea { resize: vertical; min-height: 65px; line-height: 1.6; }
.submit-btn {
  width: 100%;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.08em;
  padding: 9px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  cursor: pointer;
  transition: opacity 0.1s;
  margin-top: 2px;
}
.submit-btn:hover { opacity: 0.82; }

/* GPX UPLOAD AREA */
.gpx-drop {
  border: 1.5px dashed rgba(13,13,13,0.35);
  padding: 16px 10px;
  text-align: center;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color 0.1s, background 0.1s;
}
.gpx-drop:hover { border-color: var(--blue); background: rgba(0,87,255,0.03); }
.gpx-drop.has-file { border-color: var(--open); border-style: solid; background: rgba(46,125,79,0.04); }
.gpx-drop-label { font-size: 0.62rem; letter-spacing: 0.06em; opacity: 0.6; }
.gpx-drop-label strong { display: block; font-size: 0.7rem; opacity: 1; margin-bottom: 2px; color: var(--ink); }
#gpx-file-input { display: none; }

/* DRAW HINT */
.draw-hint {
  background: rgba(0,87,255,0.06);
  border: 1.5px solid rgba(0,87,255,0.25);
  padding: 10px 12px;
  font-size: 0.65rem;
  line-height: 1.7;
  letter-spacing: 0.03em;
  margin-bottom: 10px;
}
.draw-hint a { color: var(--blue); cursor: pointer; text-decoration: underline; }

/* EMPTY */
.empty {
  text-align: center;
  padding: 30px 0;
  opacity: 0.35;
  font-size: 0.68rem;
  line-height: 2;
}

/* LEGEND */
.legend-row {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-bottom: 7px;
  font-size: 0.65rem;
  letter-spacing: 0.04em;
}
.leg-line {
  width: 28px;
  height: 3px;
  flex-shrink: 0;
  border-radius: 2px;
}
.section-head {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.06em;
  margin: 14px 0 7px;
}
.section-head:first-child { margin-top: 0; }

/* LAYER TOGGLE */
.layer-toggle {
  position: absolute;
  bottom: 24px;
  left: 12px;
  z-index: 500;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.layer-btn {
  font-family: 'DM Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 5px 10px;
  border: 1.5px solid var(--ink);
  background: var(--paper);
  color: var(--ink);
  cursor: pointer;
  transition: all 0.1s;
  box-shadow: 2px 2px 0 rgba(13,13,13,0.12);
}
.layer-btn.active { background: var(--ink); color: var(--paper); }

.map-draw { cursor: crosshair !important; }
.leaflet-container { font-family: 'DM Mono', monospace; }
</style>
</head>
<body>

<header>
  <div class="wordmark">Wrangell <em>Trails</em></div>
  <div class="header-right">
    <button class="hbtn" id="btn-list" onclick="showView('list')">Trails</button>
    <button class="hbtn draw" id="btn-add" onclick="showView('add')">+ Add Trail</button>
    <button class="hbtn" id="btn-legend" onclick="showView('legend')">Legend</button>
  </div>
</header>

<div class="app">
  <div id="map">
    <div class="layer-toggle">
      <button class="layer-btn active" id="lbtn-osm" onclick="setLayer('osm')">Street</button>
      <button class="layer-btn" id="lbtn-topo" onclick="setLayer('topo')">Topo</button>
      <button class="layer-btn" id="lbtn-sat" onclick="setLayer('sat')">Satellite</button>
    </div>
  </div>

  <aside class="panel">
    <div class="panel-header">
      <div class="panel-title" id="panel-title">McCarthy Trails</div>
      <div class="panel-sub" id="panel-sub">Wrangell–St. Elias</div>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </aside>
</div>

<input type="file" id="gpx-file-input" accept=".gpx">

<script>
const STATUS = {
  open:         { label: 'Open',         color: '#2e7d4f' },
  caution:      { label: 'Caution',      color: '#c97d00' },
  closed:       { label: 'Closed',       color: '#b82000' },
  unmaintained: { label: 'Unmaintained', color: '#6b5c45' },
};
const DIFFICULTY = ['Easy','Moderate','Strenuous','Difficult'];
const STORAGE_KEY = 'wrangell_trails_v1';

let trails = [];
let selectedId = null;
let view = 'list';
let drawMode = false;
let drawPoints = [];
let drawPolyline = null;
let drawMarkers = [];
let pendingPoints = null;
let editingId = null;

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(trails)); }
function load() {
  try { trails = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { trails = []; }
}

// ── MAP ────────────────────────────────────────────────────────────────────
const map = L.map('map', { center: [61.43, -142.92], zoom: 11, zoomControl: false });
L.control.zoom({ position: 'topright' }).addTo(map);

const layers = {
  osm:  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors', maxZoom: 19 }),
  topo: L.tileLayer('https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'USGS Topo', maxZoom: 16 }),
  sat:  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Esri World Imagery', maxZoom: 19 })
};
layers.osm.addTo(map);

function setLayer(name) {
  Object.keys(layers).forEach(k => {
    if (map.hasLayer(layers[k])) map.removeLayer(layers[k]);
    document.getElementById('lbtn-' + k).classList.toggle('active', k === name);
  });
  layers[name].addTo(map);
}

// ── POLYLINES ──────────────────────────────────────────────────────────────
let polylines = {};

function renderMapTrails() {
  Object.values(polylines).forEach(p => map.removeLayer(p));
  polylines = {};
  trails.forEach(t => {
    if (!t.points || t.points.length < 2) return;
    const color = STATUS[t.status]?.color || '#888';
    const selected = selectedId === t.id;
    const pl = L.polyline(t.points, {
      color, weight: selected ? 6 : 4,
      opacity: selected ? 1 : 0.78,
      dashArray: t.status === 'unmaintained' ? '9,6' : null,
      lineCap: 'round', lineJoin: 'round'
    }).addTo(map);
    pl.on('click', () => selectTrail(t.id));
    pl.on('mouseover', () => { if (!selected) pl.setStyle({ weight: 5, opacity: 1 }); });
    pl.on('mouseout',  () => { if (!selected) pl.setStyle({ weight: 4, opacity: 0.78 }); });
    polylines[t.id] = pl;
  });
}

function selectTrail(id) {
  selectedId = id;
  renderMapTrails();
  // Fit map to trail
  const t = trails.find(x => x.id === id);
  if (t?.points?.length) map.fitBounds(L.latLngBounds(t.points), { padding: [40, 60] });
  showView('detail');
}

// ── GPX ────────────────────────────────────────────────────────────────────
function parseGpx(text) {
  const doc = new DOMParser().parseFromString(text, 'application/xml');
  const pts = [];
  for (const tag of ['trkpt','rtept','wpt']) {
    const nodes = doc.getElementsByTagName(tag);
    if (nodes.length > 0) {
      for (const n of nodes) {
        const lat = parseFloat(n.getAttribute('lat'));
        const lon = parseFloat(n.getAttribute('lon'));
        if (!isNaN(lat) && !isNaN(lon)) pts.push([lat, lon]);
      }
      break;
    }
  }
  return pts;
}

function calcLength(points) {
  if (!points || points.length < 2) return 0;
  let d = 0;
  for (let i = 1; i < points.length; i++) d += map.distance(points[i-1], points[i]);
  return d;
}

function fmtDist(m) {
  return (m / 1609.34).toFixed(1) + ' mi (' + (m / 1000).toFixed(1) + ' km)';
}

// ── DRAW ───────────────────────────────────────────────────────────────────
function startDraw() {
  drawMode = true;
  drawPoints = [];
  map.getContainer().classList.add('map-draw');
  map.on('click', onMapClick);
  map.on('dblclick', onMapDblClick);
  renderPanel();
}

function stopDraw(keep) {
  drawMode = false;
  map.getContainer().classList.remove('map-draw');
  map.off('click', onMapClick);
  map.off('dblclick', onMapDblClick);
  if (drawPolyline) { map.removeLayer(drawPolyline); drawPolyline = null; }
  drawMarkers.forEach(m => map.removeLayer(m));
  drawMarkers = [];
  pendingPoints = (keep && drawPoints.length >= 2) ? [...drawPoints] : pendingPoints;
  drawPoints = [];
}

function onMapClick(e) {
  const pt = [e.latlng.lat, e.latlng.lng];
  drawPoints.push(pt);
  const m = L.circleMarker(pt, { radius: 4, color: '#0057ff', fillColor: '#0057ff', fillOpacity: 1, weight: 2 }).addTo(map);
  drawMarkers.push(m);
  if (drawPolyline) map.removeLayer(drawPolyline);
  if (drawPoints.length > 1) {
    drawPolyline = L.polyline(drawPoints, { color: '#0057ff', weight: 3, dashArray: '6,4', opacity: 0.8 }).addTo(map);
  }
}

function onMapDblClick() {
  if (drawPoints.length < 2) return;
  drawPoints.pop(); // dblclick fires two clicks
  stopDraw(true);
  renderPanel();
}

// ── CRUD ───────────────────────────────────────────────────────────────────
function saveTrail(data) {
  const points = pendingPoints || (editingId ? trails.find(t => t.id === editingId)?.points : null);
  if (!points || points.length < 2) { alert('No route data. Upload a GPX or draw the trail on the map.'); return; }
  if (editingId) {
    const t = trails.find(t => t.id === editingId);
    Object.assign(t, data, { points, length: calcLength(points) });
  } else {
    trails.push({ id: 't' + Date.now(), ...data, points, length: calcLength(points) });
  }
  save();
  pendingPoints = null;
  editingId = null;
  renderMapTrails();
  showView('list');
}

function deleteTrail(id) {
  if (!confirm('Delete this trail? This cannot be undone.')) return;
  trails = trails.filter(t => t.id !== id);
  save();
  if (polylines[id]) { map.removeLayer(polylines[id]); delete polylines[id]; }
  selectedId = null;
  showView('list');
}

function downloadGpx(id) {
  const t = trails.find(x => x.id === id);
  if (!t) return;
  const trkpts = t.points.map(([lat,lon]) =>
    `    <trkpt lat="${lat.toFixed(6)}" lon="${lon.toFixed(6)}"></trkpt>`).join('\n');
  const gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="Wrangell Trails">
  <trk><name>${t.name}</name><trkseg>
${trkpts}
  </trkseg></trk>
</gpx>`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([gpx], { type: 'application/gpx+xml' }));
  a.download = t.name.toLowerCase().replace(/\s+/g,'-') + '.gpx';
  a.click();
}

// ── VIEWS ──────────────────────────────────────────────────────────────────
function showView(v) {
  view = v;
  if (v !== 'add' && drawMode) stopDraw(false);
  if (v !== 'detail') selectedId = null;
  ['list','add','legend'].forEach(k => {
    const b = document.getElementById('btn-' + k);
    if (b) b.classList.toggle('active', v === k);
  });
  renderMapTrails();
  renderPanel();
}

function renderPanel() {
  const title = document.getElementById('panel-title');
  const sub   = document.getElementById('panel-sub');
  const body  = document.getElementById('panel-body');
  if (view === 'list')   { title.textContent = 'McCarthy Trails'; sub.textContent = 'Wrangell–St. Elias'; body.innerHTML = renderList(); }
  if (view === 'detail') { const t = trails.find(t=>t.id===selectedId); title.textContent = t?.name||'—'; sub.textContent = STATUS[t?.status]?.label||''; body.innerHTML = t ? renderDetail(t) : ''; }
  if (view === 'add')    { title.textContent = editingId ? 'Edit Trail' : 'Add Trail'; sub.textContent = editingId ? 'Update details' : 'New route'; body.innerHTML = renderForm(); }
  if (view === 'legend') { title.textContent = 'Legend'; sub.textContent = 'Status & usage'; body.innerHTML = renderLegend(); }
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderList() {
  if (!trails.length) return `<div class="empty">No trails yet.<br>Click <strong>+ Add Trail</strong><br>to get started.</div>`;
  return trails.map(t => {
    const color = STATUS[t.status]?.color || '#888';
    const dist = t.length ? (t.length/1000).toFixed(1)+' km' : '';
    return `<div class="trail-item${selectedId===t.id?' active':''}" onclick="selectTrail('${t.id}')">
      <div class="trail-dot" style="background:${color}"></div>
      <div class="trail-name">${esc(t.name)}</div>
      <div class="trail-km">${dist}</div>
    </div>`;
  }).join('');
}

function renderDetail(t) {
  const color = STATUS[t.status]?.color || '#888';
  const label = STATUS[t.status]?.label || t.status;
  return `
    <span class="back-btn" onclick="showView('list')">← All trails</span>
    <div class="detail-name">${esc(t.name)}</div>
    <span class="status-pill" style="background:${color}">${label}</span>
    <div class="meta-grid">
      <div class="meta-cell"><div class="meta-label">Difficulty</div><div class="meta-value">${esc(t.difficulty||'—')}</div></div>
      <div class="meta-cell"><div class="meta-label">Length</div><div class="meta-value">${t.length ? fmtDist(t.length) : '—'}</div></div>
      <div class="meta-cell" style="grid-column:span 2"><div class="meta-label">Season / Access</div><div class="meta-value">${esc(t.season||'—')}</div></div>
    </div>
    ${t.notes ? `<div class="notes-block">${esc(t.notes)}</div>` : ''}
    <button class="detail-btn" onclick="downloadGpx('${t.id}')">↓ Download GPX</button>
    <button class="detail-btn" onclick="editTrail('${t.id}')">Edit Trail</button>
    <button class="detail-btn danger" onclick="deleteTrail('${t.id}')">Delete Trail</button>
  `;
}

function renderForm() {
  const t = editingId ? trails.find(x => x.id === editingId) : {};
  const hasRoute = pendingPoints || (editingId && t?.points?.length >= 2);
  const routeLen = hasRoute ? calcLength(pendingPoints || t?.points) : 0;

  return `
    ${editingId ? `<span class="back-btn" onclick="cancelEdit()">← Cancel</span>` : ''}

    <div class="section-head">Route</div>
    <div class="gpx-drop${hasRoute?' has-file':''}" onclick="document.getElementById('gpx-file-input').click()">
      <div class="gpx-drop-label">
        <strong>${hasRoute ? '✓ ' + fmtDist(routeLen) : 'Upload GPX file'}</strong>
        ${hasRoute ? 'Click to replace' : 'From Gaia, CalTopo, AllTrails, etc.'}
      </div>
    </div>

    ${!hasRoute ? `<div class="draw-hint">
      Or <a onclick="startDraw()">draw on map</a> — click to place points, double-click to finish.
      ${drawMode ? '<br><strong>Drawing active.</strong> Click map to add points.' : ''}
    </div>` : ''}

    <div class="section-head">Details</div>
    <div class="form-row">
      <label class="form-label">Trail Name</label>
      <input class="form-input" id="f-name" value="${esc(t?.name||'')}" placeholder="e.g. Bonanza Mine Trail">
    </div>
    <div class="form-row">
      <label class="form-label">Status</label>
      <select class="form-select" id="f-status">
        ${Object.entries(STATUS).map(([v,s])=>`<option value="${v}"${(t?.status||'open')===v?' selected':''}>${s.label}</option>`).join('')}
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">Difficulty</label>
      <select class="form-select" id="f-diff">
        ${DIFFICULTY.map(d=>`<option${(t?.difficulty||'Moderate')===d?' selected':''}>${d}</option>`).join('')}
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">Season / Access Window</label>
      <input class="form-input" id="f-season" value="${esc(t?.season||'')}" placeholder="e.g. June – September">
    </div>
    <div class="form-row">
      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="f-notes" placeholder="Conditions, hazards, trailhead parking...">${esc(t?.notes||'')}</textarea>
    </div>
    <button class="submit-btn" onclick="handleSubmit()">${editingId ? 'Save Changes' : 'Add Trail'}</button>
  `;
}

function renderLegend() {
  return `
    <div class="section-head">Trail Status</div>
    ${Object.entries(STATUS).map(([k,s])=>`
      <div class="legend-row">
        <div class="leg-line" style="background:${s.color};${k==='unmaintained'?'background:repeating-linear-gradient(90deg,'+s.color+' 0,'+s.color+' 7px,transparent 7px,transparent 13px)':''}"></div>
        <span>${s.label}</span>
      </div>`).join('')}
    <div class="section-head">Map Layers</div>
    <div style="font-size:0.65rem;line-height:1.8;opacity:0.75;">
      Toggle Street / Topo / Satellite using the buttons in the lower-left corner of the map.
      Topo uses USGS National Map — excellent detail for the Wrangells.
    </div>
    <div class="section-head">Adding Trails</div>
    <div style="font-size:0.65rem;line-height:1.8;opacity:0.75;">
      Upload a GPX file exported from Gaia GPS, CalTopo, AllTrails, or a Garmin device.
      Or use the draw tool to trace a route directly on the map.
      Length is calculated automatically from coordinates.
    </div>
    <div class="section-head">Data</div>
    <div style="font-size:0.65rem;line-height:1.8;opacity:0.75;">
      All trail data is saved to this browser's local storage and persists across sessions on this device.
    </div>
  `;
}

// ── ACTIONS ────────────────────────────────────────────────────────────────
function handleSubmit() {
  const name = document.getElementById('f-name')?.value.trim();
  if (!name) { alert('Please enter a trail name.'); return; }
  saveTrail({
    name,
    status: document.getElementById('f-status').value,
    difficulty: document.getElementById('f-diff').value,
    season: document.getElementById('f-season').value.trim(),
    notes: document.getElementById('f-notes').value.trim()
  });
}

function editTrail(id) {
  editingId = id;
  pendingPoints = null;
  showView('add');
}

function cancelEdit() {
  editingId = null;
  pendingPoints = null;
  stopDraw(false);
  showView('list');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── GPX FILE HANDLER ───────────────────────────────────────────────────────
document.getElementById('gpx-file-input').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const pts = parseGpx(e.target.result);
    if (pts.length < 2) { alert('Could not find track points in this GPX file.'); return; }
    pendingPoints = pts;
    stopDraw(false);
    map.fitBounds(L.latLngBounds(pts), { padding: [40, 40] });
    renderPanel();
  };
  reader.readAsText(file);
  this.value = '';
});

// ── INIT ───────────────────────────────────────────────────────────────────
load();
renderMapTrails();
showView('list');
</script>
</body>
</html>
